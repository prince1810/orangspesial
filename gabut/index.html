<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classified: For My Universe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Montserrat:wght@700&family=Playfair+Display:ital@1&family=Quicksand:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>

    <audio id="bg-music" loop>
        <source src="lagu-kamu.mp3" type="audio/mpeg">
    </audio>

    <div id="lock-screen" class="overlay-screen">
        <div class="terminal">
            <p class="t-red">>> SYSTEM_STATUS: ENCRYPTED</p>
            <p class="t-white">>> HINT: tanggal lahir aku berapa hayoh?</p>
            <div class="input-area">
                <span>>> CODE:</span>
                <input type="text" id="pass-input" maxlength="4" placeholder="****" autofocus autocomplete="off">
            </div>
            <button class="bypass-btn" onclick="validate()">RUN BYPASS</button>
            <p id="error-txt" class="error hidden">!! ACCESS_DENIED !!</p>
        </div>
    </div>

    <main class="content-wrapper hidden" id="main-ui">
        <div id="dynamic-content"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
